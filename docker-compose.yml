version: "3.8"

services:
  # API 后端
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./data:/app/data
      - ./bgm:/app/bgm
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    # GPU 支持（可选）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # WebUI 前端
  webui:
    build: .
    command: python -m streamlit run webui.py --server.port 8503 --server.headless true --server.address 0.0.0.0
    ports:
      - "8503:8503"
    volumes:
      - ./uploads:/app/uploads
      - ./output:/app/output
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped

  # Nginx 反向代理（可选）
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #   depends_on:
  #     - api
  #     - webui
